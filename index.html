<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詞彙學習遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Safe cross-device fonts for Chinese */
        body { 
            font-family: "PingFang HK", "Heiti TC", "Microsoft JhengHei", sans-serif;
            overflow-x: hidden;
            user-select: none;
        }
        
        /* Background classes */
        .bg-park { background: url('images/park.jpg') center/cover fixed; }
        .bg-room { background: url('images/room.jpg') center/cover fixed; }
        .bg-road { background: url('images/road.jpg') center/cover fixed; }
        .bg-game { background: url('images/game.jpg') center/cover fixed; }
        .bg-white { background-color: #ffffff; }

        .card-container { transition: all 0.2s ease; }
        .selected-card { border-color: #22c55e !important; border-width: 6px !important; box-shadow: 0 0 15px rgba(34, 197, 94, 0.5); }
        
        .drop-zone { min-height: 250px; transition: background 0.3s; }
        .feedback-pop {
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            font-size: 3rem; animation: popUp 0.8s ease-out forwards; pointer-events: none;
        }
        @keyframes popUp {
            0% { transform: translate(-50%, 20px) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -20px) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -40px) scale(1); opacity: 0; }
        }

        /* Game-like Buttons */
        .btn-game {
            box-shadow: 0 6px 0 #b45309; transition: all 0.1s;
        }
        .btn-game:active { transform: translateY(4px); box-shadow: 0 2px 0 #b45309; }
        
        .cat-box-0 { border-color: #f472b6; } /* Pink */
        .cat-box-1 { border-color: #60a5fa; } /* Blue */
        .cat-box-2 { border-color: #4ad395; } /* Green */
        .cat-box-3 { border-color: #fb923c; } /* Orange */
    </style>
</head>
<body class="bg-park">

    <nav class="fixed top-0 left-0 w-full h-12 bg-white/95 shadow-md z-50 flex items-center justify-between px-4">
        <div class="flex gap-2">
            <button onclick="showSubModes()" class="px-4 py-1 bg-sky-500 text-white rounded-full font-bold hover:bg-sky-600 shadow-sm">分類遊戲</button>
            <button class="px-4 py-1 bg-orange-500 text-white rounded-full font-bold opacity-50 cursor-not-allowed">擴展性命名</button>
            <button class="px-4 py-1 bg-gray-400 text-white rounded-full font-bold opacity-50 cursor-not-allowed">快速命名</button>
        </div>

        <div class="flex items-center gap-4 text-sm font-bold text-gray-700">
            <div class="flex items-center gap-2">
                <span>大小</span>
                <input type="range" id="sizeSlider" min="80" max="180" value="110" oninput="updateCardSize(this.value)">
            </div>
            <label class="flex items-center gap-1 cursor-pointer">
                <input type="checkbox" id="showTextToggle" checked onchange="toggleText()"> 文字
            </label>
            <select onchange="document.body.className = 'bg-' + this.value" class="border rounded-md px-2 py-1 bg-gray-50">
                <option value="park">草地</option>
                <option value="room">房間</option>
                <option value="road">馬路</option>
                <option value="game">遊戲</option>
                <option value="white">純白</option>
            </select>
            <button onclick="exportResult()" class="px-3 py-1 bg-emerald-500 text-white rounded-md hover:bg-emerald-600">💾 匯出</button>
        </div>
    </nav>

    <main id="app" class="mt-16 p-4 min-h-screen">
        </main>

    <script>
        // Data Structure
        const bulkVocabData = `
水果 哈密瓜 水果/哈密瓜.png
水果 士多啤梨 水果/士多啤梨.png
水果 奇異果 水果/奇異果.png
蔬菜 粟米 蔬菜/粟米.png
蔬菜 紅椒 蔬菜/紅椒.png
蔬菜 白菜 蔬菜/白菜.png
動物 狗 動物/狗.png
動物 貓 動物/貓.png
`; // Paste full data here

        const vocabList = bulkVocabData.trim().split('\n').map(line => {
            const [cat, name, path] = line.trim().split(/\s+/);
            return { cat, name, path: `images/${path}` };
        });

        const categories = [...new Set(vocabList.map(item => item.cat))];
        const borderColors = ['border-pink-400', 'border-blue-400', 'border-green-400', 'border-orange-400'];

        // State
        let view = 'WELCOME';
        let gameMode = ''; // 'ordered' or 'free'
        let selectedItems = [];
        let cardSize = 110;
        let showText = true;

        const sounds = {
            star: new Audio('sounds/star.mp3'),
            wrong: new Audio('sounds/wrong.mp3'),
            hooray: new Audio('sounds/hooray.mp3')
        };

        function updateView() {
            const app = document.getElementById('app');
            app.innerHTML = '';

            if (view === 'WELCOME') {
                app.innerHTML = `<div class="flex h-[70vh] items-center justify-center text-4xl font-extrabold text-sky-900 drop-shadow-sm">請選擇活動開始</div>`;
            } 
            else if (view === 'SUB_MODES') {
                app.innerHTML = `
                <div class="flex flex-col items-center justify-center gap-12 py-20">
                    <div class="flex gap-10">
                        <button onclick="setView('SELECT', 'ordered')" class="w-64 h-32 bg-sky-500 text-white text-3xl font-bold rounded-3xl border-b-8 border-sky-700 active:translate-y-1 active:border-b-0 shadow-2xl">按類別分類</button>
                        <button onclick="setView('SELECT', 'free')" class="w-64 h-32 bg-orange-500 text-white text-3xl font-bold rounded-3xl border-b-8 border-orange-700 active:translate-y-1 active:border-b-0 shadow-2xl">自由分類</button>
                    </div>
                </div>`;
            }
            else if (view === 'SELECT') {
                renderSelection(app);
            }
            else if (view === 'PREP') {
                renderPrepBoard(app);
            }
            else if (view === 'GAME') {
                renderGameStage(app);
            }
        }

        function renderSelection(app) {
            let html = `
                <div class="sticky top-12 z-40 bg-white/90 p-4 rounded-xl mb-6 shadow-md flex justify-between items-center border-4 border-sky-200">
                    <div class="flex gap-4">
                        <select onchange="document.getElementById('section-'+this.value).scrollIntoView()" class="p-2 border-2 border-sky-300 rounded-lg font-bold">
                            <option>快速跳至...</option>
                            ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                        </select>
                        <input type="text" placeholder="🔍 搜尋詞彙..." class="p-2 border-2 border-sky-300 rounded-lg font-bold" oninput="filterCards(this.value)">
                    </div>
                    <button onclick="goNextFromSelect()" class="px-8 py-3 bg-orange-500 text-white rounded-full font-black text-xl btn-game">下一步：已選取 ${selectedItems.length} 張 🚀</button>
                </div>
            `;

            categories.forEach(cat => {
                html += `
                <div id="section-${cat}" class="mb-10">
                    <div class="bg-orange-500 text-white px-6 py-2 rounded-t-2xl flex justify-between items-center shadow-sm">
                        <span class="text-xl font-bold">${cat}</span>
                        <button onclick="selectAll('${cat}')" class="bg-white/20 hover:bg-white/40 px-4 py-1 rounded-full text-sm font-bold">全選此類</button>
                    </div>
                    <div class="bg-white/40 p-4 rounded-b-2xl grid grid-cols-4 md:grid-cols-6 lg:grid-cols-10 gap-2">
                        ${vocabList.filter(v => v.cat === cat).map(v => `
                            <div onclick="toggleItem('${v.path}')" class="cursor-pointer bg-white p-1 rounded-xl border-4 transition-all ${selectedItems.some(i=>i.path===v.path)?'selected-card':'border-transparent'}" style="width: ${cardSize}px">
                                <img src="${v.path}" class="w-full aspect-square object-contain">
                                <p class="text-center text-xs font-bold mt-1 ${showText?'':'hidden'}">${v.name}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            });
            app.innerHTML = html + `<button onclick="setView('SUB_MODES')" class="mb-10 px-6 py-2 bg-gray-500 text-white rounded-full font-bold">返回</button>`;
        }

        function renderPrepBoard(app) {
            const activeCats = [...new Set(selectedItems.map(i => i.cat))];
            app.innerHTML = `
                <div class="text-center mb-6"><h2 class="text-3xl font-black text-white drop-shadow-md">準備好了嗎？</h2></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                    ${activeCats.map((cat, idx) => `
                        <div class="bg-white/80 rounded-3xl p-6 border-8 ${borderColors[idx % 4]} shadow-xl">
                            <div class="flex items-center gap-4 mb-6">
                                <img src="images/categories/${cat}.png" class="w-20 h-20 object-contain">
                                <h3 class="text-4xl font-black text-gray-700">${cat}</h3>
                            </div>
                            <div class="flex flex-wrap gap-4">
                                ${selectedItems.filter(i => i.cat === cat).map(i => `
                                    <div class="bg-white p-2 rounded-xl shadow" style="width:${cardSize}px">
                                        <img src="${i.path}" class="w-full">
                                        <p class="text-center font-bold text-sm ${showText?'':'hidden'}">${i.name}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="flex justify-center gap-6 pb-20">
                    <button onclick="setView('SELECT')" class="px-8 py-3 bg-gray-500 text-white rounded-full font-bold text-xl">返回修改</button>
                    <button onclick="setView('GAME')" class="px-12 py-4 bg-emerald-500 text-white rounded-full font-black text-3xl btn-game">開始遊戲 🚀</button>
                </div>
            `;
        }

        function renderGameStage(app) {
            const shuffled = [...selectedItems].sort(() => Math.random() - 0.5);
            const activeCats = gameMode === 'free' ? ['分類 A', '分類 B'] : [...new Set(selectedItems.map(i => i.cat))];

            app.innerHTML = `
                <div id="shuffled-box" class="min-h-[160px] border-4 border-dashed border-white/60 rounded-3xl p-6 flex flex-wrap gap-4 justify-center bg-white/20 mb-10">
                    ${shuffled.map((v, i) => `
                        <div id="drag-${i}" class="bg-white p-2 rounded-xl shadow-xl cursor-grab relative" draggable="true" 
                             style="width:${cardSize}px" ondragstart="handleStart(event, '${v.cat}')">
                            <img src="${v.path}" class="w-full pointer-events-none">
                            <p class="text-center font-bold text-sm ${showText?'':'hidden'}">${v.name}</p>
                            <div class="feedback-container"></div>
                        </div>
                    `).join('')}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    ${activeCats.map((cat, idx) => `
                        <div class="drop-zone bg-white/60 rounded-[40px] p-6 border-8 ${borderColors[idx % 4]} min-h-[300px]" 
                             ondragover="event.preventDefault()" ondrop="handleDrop(event, '${cat}')">
                            ${gameMode === 'ordered' ? `
                                <div class="flex items-center gap-3 mb-4">
                                    <img src="images/categories/${cat}.png" class="w-12 h-12 object-contain">
                                    <h3 class="text-2xl font-black text-gray-700">${cat}</h3>
                                </div>` : ''}
                            <div class="flex flex-wrap gap-3 slot-container"></div>
                        </div>
                    `).join('')}
                </div>
                <div class="mt-10 flex justify-center gap-4">
                    <button onclick="setView('SELECT')" class="px-6 py-2 bg-gray-500 text-white rounded-full font-bold">返回</button>
                    ${gameMode === 'free' ? `<button onclick="finishFreeGame()" class="px-10 py-3 bg-emerald-500 text-white rounded-full font-black text-xl btn-game">完成分類 ✨</button>` : ''}
                </div>
            `;
        }

        // Logic Helpers
        function showSubModes() { view = 'SUB_MODES'; updateView(); }
        function setView(v, mode) { view = v; if(mode) gameMode = mode; updateView(); }
        
        function toggleItem(path) {
            const idx = selectedItems.findIndex(i => i.path === path);
            if (idx > -1) selectedItems.splice(idx, 1);
            else selectedItems.push(vocabList.find(v => v.path === path));
            updateView();
        }

        function selectAll(cat) {
            const items = vocabList.filter(v => v.cat === cat);
            items.forEach(i => { if(!selectedItems.some(s=>s.path===i.path)) selectedItems.push(i); });
            updateView();
        }

        function goNextFromSelect() {
            if (selectedItems.length === 0) return alert('請先選擇圖片');
            view = (gameMode === 'free') ? 'GAME' : 'PREP';
            updateView();
        }

        function updateCardSize(val) { cardSize = val; updateView(); }
        function toggleText() { showText = !showText; updateView(); }

        let currentDragCat = '';
        function handleStart(e, cat) { currentDragCat = cat; e.dataTransfer.setData('text', e.target.id); }

        function handleDrop(e, zoneCat) {
            e.preventDefault();
            const id = e.dataTransfer.getData('text');
            const el = document.getElementById(id);
            const container = e.currentTarget.querySelector('.slot-container');
            container.appendChild(el);

            const isCorrect = (gameMode === 'free' || currentDragCat === zoneCat);
            const feedback = document.createElement('div');
            feedback.className = 'feedback-pop';
            feedback.innerHTML = isCorrect ? '⭐' : '❌';
            el.appendChild(feedback);
            
            sounds[isCorrect ? 'star' : 'wrong'].play();
            if (gameMode === 'ordered') checkWin();
        }

        function checkWin() {
            if (document.getElementById('shuffled-box').children.length === 0) {
                const incorrect = document.querySelectorAll('.feedback-pop').length; // Logic can be more complex, but simple for now
                finishFreeGame();
            }
        }

        function finishFreeGame() {
            confetti();
            sounds.hooray.play();
        }

        async function exportResult() {
            const app = document.getElementById('app');
            const canvas = await html2canvas(app, { scale: 2, useCORS: true, backgroundColor: null });
            const link = document.createElement('a');
            link.download = '學習成果.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        updateView();
    </script>
</body>
</html>
