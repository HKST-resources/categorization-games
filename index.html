<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>詞彙學習遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --card-width: 110px; --card-font-size: 1.1rem; }
        body { font-family: sans-serif; overflow-x: hidden; user-select: none; }
        
        /* Backgrounds */
        .bg-park { background: url('images/park.jpg') center/cover fixed; }
        .bg-room { background: url('images/room.jpg') center/cover fixed; }
        .bg-road { background: url('images/road.jpg') center/cover fixed; }
        .bg-game { background: url('images/game.jpg') center/cover fixed; }
        .bg-white { background-color: #ffffff; }

        /* Fixed Viewport Container for Game Stage */
        .game-viewport { height: calc(100vh - 80px); display: flex; flex-direction: column; gap: 1rem; }

        /* Card Styles */
        .vocab-card {
            width: var(--card-width);
            transition: transform 0.1s;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .vocab-card p { font-size: var(--card-font-size); font-weight: 400; text-align: center; margin-top: 4px; }
        .selected-card { border: 6px solid #22c55e !important; box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }

        /* Category Box Colors */
        .box-pink { border: 8px solid #FB6764; background: rgba(255, 255, 255, 0.9); }
        .box-blue { border: 8px solid #4BD8F8; background: rgba(255, 255, 255, 0.9); }
        .box-green { border: 8px solid #4ad395; background: rgba(255, 255, 255, 0.9); }
        .box-orange { border: 8px solid #fb923c; background: rgba(255, 255, 255, 0.9); }

        .feedback-pop {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            font-size: 4rem; z-index: 50; pointer-events: none;
            animation: popUp 0.8s ease-out forwards;
        }
        @keyframes popUp {
            0% { transform: translate(-50%, 10px) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -30px) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -50px) scale(1); opacity: 0; }
        }

        .btn-game { box-shadow: 0 5px 0 #92400e; transition: all 0.1s; }
        .btn-game:active { transform: translateY(3px); box-shadow: 0 2px 0 #92400e; }
        .hidden-text p { display: none; }
    </style>
</head>
<body class="bg-park">

    <nav class="fixed top-0 left-0 w-full h-12 bg-white/95 shadow-md z-[100] flex items-center justify-between px-4">
        <div class="flex gap-2">
            <button onclick="showSubModes()" class="px-4 py-1 bg-sky-500 text-white rounded-full font-bold shadow-sm">分類遊戲</button>
            <button class="px-4 py-1 bg-orange-500 text-white rounded-full font-bold opacity-50">擴展性命名</button>
            <button class="px-4 py-1 bg-gray-400 text-white rounded-full font-bold opacity-50">快速命名</button>
        </div>

        <div class="flex items-center gap-4 text-sm font-bold text-gray-700">
            <div class="flex items-center gap-2">
                <span>圖片大小</span>
                <input type="range" id="sizeSlider" min="80" max="200" value="110" oninput="handleSizeChange(this.value)">
            </div>
            <label class="flex items-center gap-1 cursor-pointer">
                <input type="checkbox" id="showTextToggle" checked onchange="handleTextToggle(this.checked)"> 顯示文字
            </label>
            <select onchange="document.body.className = 'bg-' + this.value" class="border rounded-md px-2 py-1 bg-gray-50">
                <option value="park">草地</option>
                <option value="room">房間</option>
                <option value="road">馬路</option>
                <option value="game">遊戲</option>
                <option value="white">純白</option>
            </select>
            <button onclick="exportResult()" class="px-3 py-1 bg-emerald-500 text-white rounded-md">💾 匯出</button>
        </div>
    </nav>

    <main id="app" class="mt-14 p-4">
        </main>

    <script>
        const bulkVocabData = `
水果 哈密瓜 水果/哈密瓜.png
水果 士多啤梨 水果/士多啤梨.png
水果 奇異果 水果/奇異果.png
蔬菜 粟米 蔬菜/粟米.png
蔬菜 紅椒 蔬菜/紅椒.png
蔬菜 白菜 蔬菜/白菜.png
動物 狗 動物/狗.png
動物 貓 動物/貓.png
`; // Paste full list here

        const vocabList = bulkVocabData.trim().split('\n').map(line => {
            const [cat, name, path] = line.trim().split(/\s+/);
            return { cat, name, path: `images/${path}`, id: 'v-' + Math.random().toString(36).substr(2, 9) };
        });

        const categories = [...new Set(vocabList.map(item => item.cat))];
        const boxStyles = ['box-pink', 'box-blue', 'box-green', 'box-orange'];

        let view = 'WELCOME';
        let gameMode = ''; 
        let selectedItems = [];
        const sounds = {
            star: new Audio('sounds/star.mp3'),
            wrong: new Audio('sounds/wrong.mp3'),
            hooray: new Audio('sounds/hooray.mp3')
        };

        function setView(v, mode) { view = v; if(mode) gameMode = mode; updateView(); }
        function showSubModes() { view = 'SUB_MODES'; updateView(); }

        function updateView() {
            const app = document.getElementById('app');
            app.innerHTML = '';
            const textClass = document.getElementById('showTextToggle').checked ? '' : 'hidden-text';

            if (view === 'WELCOME') {
                app.innerHTML = `<div class="flex h-[80vh] items-center justify-center text-4xl text-sky-900">請選擇活動開始</div>`;
            } 
            else if (view === 'SUB_MODES') {
                app.innerHTML = `
                <div class="flex flex-col items-center justify-center gap-12 py-20">
                    <div class="flex gap-10">
                        <button onclick="setView('SELECT', 'ordered')" class="w-72 h-36 bg-sky-500 text-white text-3xl font-bold rounded-[2rem] btn-game">按類別分類</button>
                        <button onclick="setView('SELECT', 'free')" class="w-72 h-36 bg-orange-500 text-white text-3xl font-bold rounded-[2rem] btn-game">自由分類</button>
                    </div>
                </div>`;
            }
            else if (view === 'SELECT') {
                renderSelection(app, textClass);
            }
            else if (view === 'PREP') {
                renderPrepBoard(app, textClass);
            }
            else if (view === 'GAME') {
                renderGameStage(app, textClass);
            }
        }

        function renderSelection(app, textClass) {
            let html = `
                <div class="sticky top-0 z-40 bg-white/95 p-4 rounded-xl mb-4 shadow-md flex justify-between items-center border-4 border-sky-200">
                    <div class="flex gap-4">
                        <select onchange="document.getElementById('section-'+this.value).scrollIntoView()" class="p-2 border rounded-lg font-bold">
                            <option>快速跳至...</option>
                            ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                        </select>
                        <input type="text" placeholder="🔍 搜尋詞彙..." class="p-2 border rounded-lg" oninput="filterCards(this.value)">
                    </div>
                    <button onclick="goNextFromSelect()" class="px-8 py-3 bg-orange-500 text-white rounded-full font-black text-xl btn-game">下一步：已選取 ${selectedItems.length} 張</button>
                </div>
                <div id="selection-grid" class="${textClass} flex flex-col gap-6">
            `;
            categories.forEach(cat => {
                html += `
                <div id="section-${cat}">
                    <div class="bg-orange-500 text-white px-6 py-1 rounded-t-xl flex justify-between items-center">
                        <span class="font-bold">${cat}</span>
                        <button onclick="selectAllInCat('${cat}')" class="text-xs bg-white/20 px-3 py-1 rounded-full">全選</button>
                    </div>
                    <div class="bg-white/40 p-3 rounded-b-xl flex flex-wrap gap-3 items-start">
                        ${vocabList.filter(v => v.cat === cat).map(v => `
                            <div onclick="toggleItem('${v.id}')" class="vocab-card cursor-pointer border-4 ${selectedItems.some(i=>i.id===v.id)?'selected-card':'border-transparent'}">
                                <img src="${v.path}" class="w-full aspect-square object-contain pointer-events-none">
                                <p>${v.name}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            });
            app.innerHTML = html + `</div><button onclick="setView('SUB_MODES')" class="mt-6 mb-10 px-6 py-2 bg-gray-500 text-white rounded-full">返回</button>`;
        }

        function renderPrepBoard(app, textClass) {
            const activeCats = [...new Set(selectedItems.map(i => i.cat))];
            app.innerHTML = `
                <div class="flex flex-col items-center gap-6 ${textClass}">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-6xl">
                        ${activeCats.map((cat, idx) => `
                            <div class="rounded-3xl p-6 ${boxStyles[idx] || 'box-orange'} shadow-xl">
                                <div class="flex items-center gap-6 mb-4">
                                    <img src="images/categories/${cat}.png" class="w-20 h-20 object-contain">
                                    <h3 class="text-3xl font-black text-gray-700">${cat}</h3>
                                </div>
                                <div class="flex flex-wrap gap-3">
                                    ${selectedItems.filter(i => i.cat === cat).map(i => `
                                        <div class="vocab-card shadow-sm"><img src="${i.path}" class="w-full"><p>${i.name}</p></div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="setView('GAME')" class="px-16 py-5 bg-orange-500 text-white rounded-full font-black text-3xl btn-game mt-4">開始遊戲 🚀</button>
                </div>
            `;
        }

        function renderGameStage(app, textClass) {
            const shuffled = [...selectedItems].sort(() => Math.random() - 0.5);
            const zones = gameMode === 'free' ? ['分類 A', '分類 B'] : [...new Set(selectedItems.map(i => i.cat))];

            app.innerHTML = `
                <div class="game-viewport ${textClass}">
                    <div id="shuffled-box" class="h-1/4 border-4 border-dashed border-white rounded-3xl p-4 flex flex-wrap gap-3 justify-center bg-white/90 overflow-y-auto">
                        ${shuffled.map((v) => `
                            <div id="${v.id}" data-cat="${v.cat}" class="vocab-card shadow-lg cursor-grab relative z-10" draggable="true" ondragstart="handleStart(event, '${v.cat}')">
                                <img src="${v.path}" class="w-full pointer-events-none">
                                <p>${v.name}</p>
                            </div>
                        `).join('')}
                    </div>

                    <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4 overflow-hidden">
                        ${zones.map((cat, idx) => `
                            <div class="drop-zone flex flex-col rounded-[32px] p-4 ${boxStyles[idx] || 'box-orange'} overflow-hidden" 
                                 data-zone-cat="${cat}" ondragover="event.preventDefault()" ondrop="handleDrop(event, '${cat}')">
                                ${gameMode === 'ordered' ? `
                                    <div class="flex items-center gap-3 mb-2 shrink-0">
                                        <img src="images/categories/${cat}.png" class="w-10 h-10 object-contain">
                                        <h3 class="text-xl font-black text-gray-700">${cat}</h3>
                                    </div>` : ''}
                                <div class="flex flex-wrap gap-3 slot-container overflow-y-auto h-full items-start content-start"></div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="h-12 flex justify-center items-center gap-4 shrink-0">
                        <button onclick="setView('SELECT')" class="px-6 py-1 bg-gray-500 text-white rounded-full text-sm">返回</button>
                        ${gameMode === 'free' ? `<button onclick="finishGame(true)" class="px-8 py-2 bg-emerald-500 text-white rounded-full font-bold btn-game">完成分類 ✨</button>` : ''}
                    </div>
                </div>
            `;
        }

        // Logic
        function handleSizeChange(val) {
            document.documentElement.style.setProperty('--card-width', val + 'px');
            document.documentElement.style.setProperty('--card-font-size', (val/100) + 'rem');
        }

        function handleTextToggle(isVisible) {
            const app = document.getElementById('app');
            isVisible ? app.classList.remove('hidden-text') : app.classList.add('hidden-text');
        }

        let currentDragCat = '';
        function handleStart(e, cat) { currentDragCat = cat; e.dataTransfer.setData('text', e.target.id); }

        function handleDrop(e, zoneCat) {
            e.preventDefault();
            const id = e.dataTransfer.getData('text');
            const el = document.getElementById(id);
            const container = e.currentTarget.querySelector('.slot-container');
            if(!container || !el) return;

            container.appendChild(el);
            const existing = el.querySelector('.feedback-pop');
            if(existing) existing.remove();

            const isCorrect = (gameMode === 'free' || currentDragCat === zoneCat);
            const feedback = document.createElement('div');
            feedback.className = 'feedback-pop';
            feedback.innerHTML = isCorrect ? '⭐' : '❌';
            el.appendChild(feedback);
            
            sounds[isCorrect ? 'star' : 'wrong'].currentTime = 0;
            sounds[isCorrect ? 'star' : 'wrong'].play();
            
            if (gameMode === 'ordered') checkWinConditions();
        }

        function checkWinConditions() {
            const shuffledBox = document.getElementById('shuffled-box');
            if (shuffledBox.children.length > 0) return; // Not finished dragging

            const cards = document.querySelectorAll('.slot-container .vocab-card');
            let allCorrect = true;

            cards.forEach(card => {
                const cardCat = card.getAttribute('data-cat');
                const zoneCat = card.closest('.drop-zone').getAttribute('data-zone-cat');
                if (cardCat !== zoneCat) allCorrect = false;
            });

            if (allCorrect) finishGame(false);
        }

        function finishGame(isFree) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            sounds.hooray.play();
        }

        function toggleItem(id) {
            const idx = selectedItems.findIndex(i => i.id === id);
            if (idx > -1) selectedItems.splice(idx, 1);
            else selectedItems.push(vocabList.find(v => v.id === id));
            updateView();
        }

        function selectAllInCat(cat) {
            const items = vocabList.filter(v => v.cat === cat);
            items.forEach(i => { if(!selectedItems.some(s=>s.id===i.id)) selectedItems.push(i); });
            updateView();
        }

        function goNextFromSelect() {
            if (selectedItems.length === 0) return alert('請先選擇圖片');
            setView(gameMode === 'free' ? 'GAME' : 'PREP');
        }

        async function exportResult() {
            const app = document.getElementById('app');
            const canvas = await html2canvas(app, { scale: 2, useCORS: true, backgroundColor: null });
            const link = document.createElement('a');
            link.download = '分類結果.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        updateView();
    </script>
</body>
</html>
