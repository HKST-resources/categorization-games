<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分類遊戲</title>
<style>
body { font-family: sans-serif; background:#FFF9C4; margin:0; }
.topbar { padding:10px; background:#FFD93D; display:flex; justify-content:space-between; }
.container { padding:10px; }
.grid { display:flex; flex-wrap:wrap; gap:10px; }
.card { width:80px; height:100px; background:#fff; border-radius:15px; box-shadow:0 5px #ccc; text-align:center; cursor:pointer; }
.card img { width:60px; height:60px; }
.selected { border:3px solid green; }
.dropzone { flex:1; min-height:150px; background:#BBDEFB; margin:5px; padding:10px; border-radius:15px; }
.hidden { display:none; }
button { padding:10px 20px; border:none; border-radius:10px; background:#4CAF50; color:#fff; }
</style>
</head>
<body>

<div class="topbar">
<div>分類遊戲 🎮</div>
<div id="score">分數: 0</div>
</div>

<div class="container" id="selectPage">
<input type="text" id="search" placeholder="搜尋...">
<div id="cardList" class="grid"></div>
<p id="selectedCount">已選: 0</p>
<button onclick="startGame()">下一步</button>
</div>

<div class="container hidden" id="gamePage">
<div id="pool" class="grid"></div>
<div style="display:flex" id="zones"></div>
<div id="message"></div>
<button onclick="finishGame()">完成</button>
</div>

{category:"動物",name:"龜",image:"images/動物/龜.png"}
];

let selected = [];
let placed = {};
let score = 0;

function renderSelect(){
  const list=document.getElementById("cardList");
  list.innerHTML="";
  cards.forEach(c=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<img src="${c.image}"><div>${c.name}</div>`;
    div.onclick=()=>{
      if(selected.includes(c)){
        selected=selected.filter(x=>x!==c);
        div.classList.remove("selected");
      }else{
        selected.push(c);
        div.classList.add("selected");
      }
      document.getElementById("selectedCount").innerText="已選: "+selected.length;
    };
    list.appendChild(div);
  });
}

function startGame(){
  document.getElementById("selectPage").classList.add("hidden");
  document.getElementById("gamePage").classList.remove("hidden");

  const pool=document.getElementById("pool");
  pool.innerHTML="";

  selected.sort(()=>Math.random()-0.5).forEach(c=>{
    const div=document.createElement("div");
    div.className="card";
    div.draggable=true;
    div.innerHTML=`<img src="${c.image}"><div>${c.name}</div>`;
    div.ondragstart=e=>e.dataTransfer.setData("id",c.id);
    pool.appendChild(div);
  });

  const zones=document.getElementById("zones");
  zones.innerHTML="";

  const cats=[...new Set(selected.map(c=>c.category))];

  cats.forEach(cat=>{
    const z=document.createElement("div");
    z.className="dropzone";
    z.innerHTML=`<h3>${cat}</h3>`;
    z.ondragover=e=>e.preventDefault();
    z.ondrop=e=>handleDrop(e,cat,z);
    zones.appendChild(z);
  });
}

function handleDrop(e,cat,zone){
  const id=e.dataTransfer.getData("id");
  const card=selected.find(c=>c.id==id);

  if(placed[id]) return;

  const div=document.createElement("div");
  div.innerHTML=`<img src="${card.image}" width=50><div>${card.name}</div>`;
  zone.appendChild(div);

  placed[id]=cat;

  if(card.category===cat){
    score+=10;
    speak(card.name+"係"+cat);
    playSound("star.mp3");
    showMsg("⭐ 正確！");
  }else{
    score-=5;
    playSound("wrong.mp3");
    showMsg("❌ 錯誤");
  }

  document.getElementById("score").innerText="分數: "+score;
}

function showMsg(msg){
  document.getElementById("message").innerText=msg;
}

function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang="zh-HK";
  speechSynthesis.speak(u);
}

function playSound(file){
  new Audio("sounds/"+file).play();
}

function finishGame(){
  launchConfetti();
  playSound("hooray.mp3");
}

function launchConfetti(){
  for(let i=0;i<100;i++){
    const div=document.createElement("div");
    div.style.position="fixed";
    div.style.left=Math.random()*100+"%";
    div.style.top="0";
    div.style.width="10px";
    div.style.height="10px";
    div.style.background="red";
    document.body.appendChild(div);
    let fall=setInterval(()=>{
      div.style.top=(div.offsetTop+5)+"px";
      if(div.offsetTop>window.innerHeight){clearInterval(fall);div.remove();}
    },20);
  }
}

renderSelect();
