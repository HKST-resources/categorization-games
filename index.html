<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>詞彙學習遊戲</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="game-container">
        <div class="game-header">
            <div class="toolbar-left">
                <label>圖片大小: <input type="range" id="sizeSlider" min="80" max="250" value="150"></label>
                <label><input type="checkbox" id="textToggle" checked onchange="toggleTextDisplay()"> 顯示文字</label>
            </div>
            
            <div class="toolbar-right">
                <select id="bgSelect" onchange="changeBg(this.value)" style="padding: 8px 15px; border-radius: 10px; border: 2px solid #ddd; font-weight: bold;">
                    <option value="park.jpg">公園</option>
                    <option value="room.jpg">房間</option>
                    <option value="road.jpg">馬路</option>
                    <option value="game.jpg">遊戲</option>
                    <option value="yellow.jpg">黃色</option>
                    <option value="stripe.jpg">條紋</option>
                    <option value="white">白色</option>
                </select>
            </div>
        </div>

        <div id="game-stage">
            </div>
    </div>

    <audio id="snd-star" src="audio/star.mp3"></audio>
    <audio id="snd-wrong" src="audio/wrong.mp3"></audio>
    <audio id="snd-hooray" src="audio/hooray.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
